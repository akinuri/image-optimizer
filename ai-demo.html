<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Image Optimizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .main-content {
            padding: 30px;
        }

        .upload-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .drop-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 50px 20px;
            text-align: center;
            background: #f8fafe;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .drop-area:hover {
            border-color: #5a67d8;
            background: #f0f7ff;
        }

        .drop-area.drag-over {
            border-color: #38a169;
            background: #f0fff4;
            transform: scale(1.02);
        }

        .drop-area-content {
            pointer-events: none;
        }

        .drop-icon {
            font-size: 3em;
            color: #667eea;
            margin-bottom: 20px;
        }

        .drop-text {
            font-size: 1.2em;
            color: #4a5568;
            margin-bottom: 10px;
        }

        .drop-subtext {
            color: #718096;
            font-size: 0.9em;
        }

        .controls {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: none;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .quality-slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }

        .quality-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }

        .quality-slider::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
        }

        .quality-display {
            text-align: center;
            font-size: 1.2em;
            font-weight: 600;
            color: #667eea;
        }

        .preview-section {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        .preview-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .preview-card h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            user-select: none;
        }

        .preview-image.comparing {
            cursor: pointer;
        }

        .compare-hint {
            font-size: 0.8em;
            color: #718096;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .preview-card:hover .compare-hint {
            opacity: 1;
        }

        .file-info {
            margin-top: 15px;
            padding: 10px;
            background: white;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }

        .file-info div {
            margin: 5px 0;
        }

        .size {
            font-weight: 600;
        }

        .size.original {
            color: #e53e3e;
        }

        .size.optimized {
            color: #38a169;
        }

        .download-btn {
            background: #38a169;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .download-btn:hover {
            background: #2f855a;
        }

        .download-btn:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .preview-section {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Image Optimizer</h1>
            <p>Convert and optimize your images to JPEG with custom quality settings</p>
        </div>
        
        <div class="main-content">
            <div class="upload-section">
                <div class="drop-area" id="dropArea">
                    <div class="drop-area-content">
                        <div class="drop-icon">📁</div>
                        <div class="drop-text">Drop your image here</div>
                        <div class="drop-subtext">or click to browse files</div>
                    </div>
                </div>
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
            </div>

            <div class="controls" id="controls">
                <div class="control-group">
                    <label for="qualitySlider">JPEG Quality</label>
                    <input type="range" id="qualitySlider" class="quality-slider" min="1" max="100" value="80">
                    <div class="quality-display" id="qualityDisplay">80%</div>
                </div>
            </div>

            <div class="preview-section" id="previewSection">
                <div class="preview-card">
                    <h3>Original Image</h3>
                    <img id="originalImage" class="preview-image" alt="Original">
                    <div class="file-info">
                        <div>Format: <span id="originalFormat"></span></div>
                        <div>Dimensions: <span id="originalDimensions"></span></div>
                        <div class="size original">Size: <span id="originalSize"></span></div>
                    </div>
                </div>

                <div class="preview-card">
                    <h3>Optimized JPEG</h3>
                    <img id="optimizedImage" class="preview-image" alt="Optimized">
                    <div class="compare-hint">Click and hold to compare with original</div>
                    <div class="file-info">
                        <div>Format: JPEG</div>
                        <div>Dimensions: <span id="optimizedDimensions"></span></div>
                        <div class="size optimized">Size: <span id="optimizedSize"></span></div>
                        <div>Reduction: <span id="reduction"></span></div>
                    </div>
                    <button id="downloadBtn" class="download-btn">Download Optimized Image</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        class ImageOptimizer {
            constructor() {
                this.currentFile = null;
                this.originalImage = null;
                this.canvas = document.createElement('canvas');
                this.ctx = this.canvas.getContext('2d');
                
                this.initializeEventListeners();
            }

            initializeEventListeners() {
                const dropArea = document.getElementById('dropArea');
                const fileInput = document.getElementById('imageInput');

                // File input change event
                fileInput.addEventListener('change', (e) => {
                    this.handleFileSelect(e.target.files[0]);
                });

                // Drag and drop events
                ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                    dropArea.addEventListener(eventName, this.preventDefaults, false);
                });

                ['dragenter', 'dragover'].forEach(eventName => {
                    dropArea.addEventListener(eventName, () => {
                        dropArea.classList.add('drag-over');
                    }, false);
                });

                ['dragleave', 'drop'].forEach(eventName => {
                    dropArea.addEventListener(eventName, () => {
                        dropArea.classList.remove('drag-over');
                    }, false);
                });

                dropArea.addEventListener('drop', (e) => {
                    const files = e.dataTransfer.files;
                    if (files.length > 0) {
                        this.handleFileSelect(files[0]);
                    }
                }, false);

                // Click to browse
                dropArea.addEventListener('click', () => {
                    fileInput.click();
                });

                document.getElementById('qualitySlider').addEventListener('input', (e) => {
                    this.updateQuality(parseInt(e.target.value));
                });

                document.getElementById('downloadBtn').addEventListener('click', () => {
                    this.downloadOptimizedImage();
                });
            }

            preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            handleFileSelect(file) {
                if (!file || !file.type.startsWith('image/')) {
                    alert('Please select a valid image file');
                    return;
                }

                this.currentFile = file;
                const reader = new FileReader();
                
                reader.onload = (e) => {
                    this.loadImage(e.target.result);
                };
                
                reader.readAsDataURL(file);
            }

            loadImage(imageSrc) {
                const img = new Image();
                
                img.onload = () => {
                    this.originalImage = img;
                    this.displayOriginalImage();
                    this.showControls();
                    this.optimizeImage();
                };
                
                img.src = imageSrc;
            }

            displayOriginalImage() {
                const originalImg = document.getElementById('originalImage');
                originalImg.src = this.originalImage.src;
                
                document.getElementById('originalFormat').textContent = this.currentFile.type.split('/')[1].toUpperCase();
                document.getElementById('originalDimensions').textContent = `${this.originalImage.width} × ${this.originalImage.height}`;
                document.getElementById('originalSize').textContent = this.formatFileSize(this.currentFile.size);
            }

            showControls() {
                document.getElementById('controls').style.display = 'block';
                document.getElementById('previewSection').style.display = 'grid';
            }

            updateQuality(quality) {
                document.getElementById('qualityDisplay').textContent = `${quality}%`;
                this.optimizeImage();
            }

            optimizeImage() {
                const quality = parseInt(document.getElementById('qualitySlider').value) / 100;
                
                // Set canvas dimensions to match image
                this.canvas.width = this.originalImage.width;
                this.canvas.height = this.originalImage.height;
                
                // Clear and draw image
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.drawImage(this.originalImage, 0, 0);
                
                // Convert to JPEG with specified quality
                this.canvas.toBlob((blob) => {
                    this.displayOptimizedImage(blob);
                }, 'image/jpeg', quality);
            }

            displayOptimizedImage(blob) {
                const optimizedImg = document.getElementById('optimizedImage');
                const url = URL.createObjectURL(blob);
                
                optimizedImg.src = url;
                
                document.getElementById('optimizedDimensions').textContent = `${this.canvas.width} × ${this.canvas.height}`;
                document.getElementById('optimizedSize').textContent = this.formatFileSize(blob.size);
                
                const reduction = ((this.currentFile.size - blob.size) / this.currentFile.size * 100).toFixed(1);
                document.getElementById('reduction').textContent = `${reduction}% smaller`;
                
                // Store the blob for download
                this.optimizedBlob = blob;
                this.optimizedImageUrl = url;
                document.getElementById('downloadBtn').disabled = false;
                
                // Add comparison functionality
                this.setupImageComparison(optimizedImg);
            }

            setupImageComparison(optimizedImg) {
                // Remove existing event listeners if any
                optimizedImg.removeEventListener('mousedown', this.startComparison);
                optimizedImg.removeEventListener('mouseup', this.endComparison);
                optimizedImg.removeEventListener('mouseleave', this.endComparison);
                optimizedImg.removeEventListener('touchstart', this.startComparison);
                optimizedImg.removeEventListener('touchend', this.endComparison);

                // Bind methods to preserve 'this' context
                this.startComparison = this.startComparison.bind(this);
                this.endComparison = this.endComparison.bind(this);

                // Add event listeners
                optimizedImg.addEventListener('mousedown', this.startComparison);
                optimizedImg.addEventListener('mouseup', this.endComparison);
                optimizedImg.addEventListener('mouseleave', this.endComparison);
                optimizedImg.addEventListener('touchstart', this.startComparison);
                optimizedImg.addEventListener('touchend', this.endComparison);
            }

            startComparison(e) {
                e.preventDefault();
                const optimizedImg = document.getElementById('optimizedImage');
                optimizedImg.src = this.originalImage.src;
                optimizedImg.classList.add('comparing');
            }

            endComparison(e) {
                e.preventDefault();
                const optimizedImg = document.getElementById('optimizedImage');
                optimizedImg.src = this.optimizedImageUrl;
                optimizedImg.classList.remove('comparing');
            }

            downloadOptimizedImage() {
                if (!this.optimizedBlob) return;
                
                const a = document.createElement('a');
                const url = URL.createObjectURL(this.optimizedBlob);
                const fileName = this.currentFile.name.replace(/\.[^/.]+$/, '') + '_optimized.jpg';
                
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            formatFileSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }
        }

        // Initialize the application
        document.addEventListener('DOMContentLoaded', () => {
            new ImageOptimizer();
        });
    </script>
</body>

</html>
